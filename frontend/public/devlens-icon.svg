<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="DevLens">
  <defs>
    <linearGradient id="lensGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="handleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-color="#1e1b4b" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Handle -->
  <line x1="63" y1="63" x2="84" y2="84"
        stroke="url(#handleGrad)" stroke-width="9" stroke-linecap="round"
        filter="url(#shadow)"/>

  <!-- Lens filled circle -->
  <circle cx="40" cy="40" r="30" fill="url(#lensGrad)" filter="url(#shadow)"/>

  <!-- Glass shine highlight -->
  <ellipse cx="31" cy="27" rx="11" ry="7"
           fill="white" fill-opacity="0.22"
           transform="rotate(-35 31 27)"/>

  <!-- Lens border ring -->
  <circle cx="40" cy="40" r="30" fill="none" stroke="#4338ca" stroke-width="2.2"/>

  <!-- Code symbol: </> -->
  <!-- < -->
  <polyline points="32,33 24,40 32,47"
            fill="none" stroke="white" stroke-width="3.6"
            stroke-linecap="round" stroke-linejoin="round"/>
  <!-- / -->
  <line x1="44" y1="30" x2="36" y2="50"
        stroke="white" stroke-width="3.6" stroke-linecap="round"/>
  <!-- > -->
  <polyline points="48,33 56,40 48,47"
            fill="none" stroke="white" stroke-width="3.6"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
